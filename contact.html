<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | YodHelp</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<header>

<div class="logo-box">
    <img src="logo.png" alt="YodHelp Logo">
    <h1>Contact YodHelp</h1>
</div>

<nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
</nav>

</header>

<section class="contact reveal">

<div class="section-title">
    <h2>Contact Us</h2>
</div>

<p class="contact-email">
    Email: yesmela25@gmail.com
</p>
<form action="https://formsubmit.co/yesmela25@gmail.com" method="POST">

    <!-- Disable Captcha -->
    <input type="hidden" name="_captcha" value="false">

    <!-- Email Subject -->
    <input type="hidden" name="_subject" value="New YodHelp Message">

    <!-- Redirect After Submit -->
    <input type="hidden" name="_next" value="https://Girma22.github.io/YodHelp/thankyou.html">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>

</form>

</section>

<footer>
<p>© 2026 YodHelp. All rights reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
